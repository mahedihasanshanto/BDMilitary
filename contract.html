
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>army</title>
    <link rel="icon" type="image/png" href="imgs/military-man.png">

    <!-- css link  -->
    <link rel="stylesheet" href="Style.css">
    <!-- daisyui  link  -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.24/dist/full.min.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- font link  -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playwrite+GB+S:wght@100..400&display=swap" rel="stylesheet">

    <!-- CUSTOM ANIMATION -->
    <style>
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(40px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(-15px);
            }
        }
    </style>
</head>
<body>
    
<section class="min-h-screen bg-gradient-to-br from-green-900 via-black to-green-800 flex items-center justify-center p-5">

  <div class="w-full max-w-6xl grid lg:grid-cols-2 gap-10 bg-white/10 backdrop-blur-lg rounded-3xl overflow-hidden shadow-2xl">

    <!-- Left Side -->
    <div class="p-10 text-white flex flex-col justify-center">

      <h1 class="text-4xl md:text-5xl font-bold mb-5">
        Bangladesh Army
      </h1>

      <p class="text-gray-300 leading-8 text-lg">
        Contact us for professional army related web development,
        responsive design, gallery section, animations and modern UI design.
      </p>

      <div class="mt-10 space-y-5">

        <div class="flex items-center gap-4">
          <div class="bg-green-600 p-3 rounded-full">
            📞
          </div>
          <span class="text-lg">+880 1234-567890</span>
        </div>

        <div class="flex items-center gap-4">
          <div class="bg-green-600 p-3 rounded-full">
            📧
          </div>
          <span class="text-lg">armywebsite@gmail.com</span>
        </div>

        <div class="flex items-center gap-4">
          <div class="bg-green-600 p-3 rounded-full">
            📍
          </div>
          <span class="text-lg">Sherpur, Mymensingh</span>
        </div>
       <div class="flex items-center gap-4">
  <div class="bg-green-600 p-3 rounded-full">
    📍
  </div>

  <span class="text-lg">
    Developed by Mahedi Hasan Shanto and 

    <a 
      href="https://mahedihasanshanto.github.io/ShantoCV/"
      target="_blank"
      class="text-blue-500 underline"
    >
      My CV 
    </a>

  </span>
</div>



      </div>

    </div>

    <!-- Right Side Form -->
    <div class="bg-white p-8 md:p-12">

      <h2 class="text-3xl font-bold text-gray-800 mb-8">
        Contact Form
      </h2>

      <form class="space-y-6">

        <!-- Name -->
        <div>
          <label class="block mb-2 font-semibold text-gray-700">
            Full Name
          </label>

          <input 
            type="text"
            placeholder="Enter your name"
            class="w-full border border-gray-300 rounded-xl px-5 py-4 outline-none focus:border-green-600 duration-300"
          >
        </div>

        <!-- Email -->
        <div>
          <label class="block mb-2 font-semibold text-gray-700">
            Email Address
          </label>

          <input 
            type="email"
            placeholder="Enter your email"
            class="w-full border border-gray-300 rounded-xl px-5 py-4 outline-none focus:border-green-600 duration-300"
          >
        </div>

        <!-- Subject -->
        <div>
          <label class="block mb-2 font-semibold text-gray-700">
            Subject
          </label>

          <input 
            type="text"
            placeholder="Website subject"
            class="w-full border border-gray-300 rounded-xl px-5 py-4 outline-none focus:border-green-600 duration-300"
          >
        </div>

        <!-- Message -->
        <div>
          <label class="block mb-2 font-semibold text-gray-700">
            Message
          </label>

          <textarea 
            rows="5"
            placeholder="Write your message..."
            class="w-full border border-gray-300 rounded-xl px-5 py-4 outline-none focus:border-green-600 duration-300 resize-none"
          ></textarea>
        </div>

        <!-- Button -->
        <button 
          type="submit"
          class="w-full bg-green-700 hover:bg-green-800 text-white py-4 rounded-xl text-lg font-semibold hover:scale-[1.02] duration-300 shadow-lg"
        >
          Send Message
        </button>

      </form>

    </div>

  </div>

</section>
    
</body>
</html>
